<div class="d-flex justify-content-between align-items-center mt-2 mb-3">
    <h5 class="m-0 text-secondary fs-6 fw-bold">{{ title }}</h5>
    </div>


<div class="table-responsive rounded shadow-sm border border-secondary">
    <table class="table table-dark table-hover table-borderless m-0 align-middle">
        <thead class="border-bottom border-secondary" style="background-color: #1a1a1a;">
            <tr>
                <th class="py-3 ps-3 text-secondary" style="font-size: 0.85rem; width: 40%;">종목명</th>
                <th class="py-3 text-center text-secondary" style="font-size: 0.85rem;">T(파동)</th>
                <th class="py-3 text-center text-secondary" style="font-size: 0.85rem;">N(수급)</th>
                <!-- <th class="py-3 text-center text-secondary" style="font-size: 0.85rem;">C(캔들)</th> -->
                <th class="py-3 text-center text-secondary" style="font-size: 0.85rem;">AI 정밀 타점</th>
            </tr>
        </thead>
        <tbody>
            {% for item in stocks %}
            <tr id="row-{{ item.id }}">
                <td class="ps-3 py-3">
                    <div class="d-flex align-items-center">
                        <!-- <span class="text-light fw-bold" style="font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px;">
                            {{ item.name_kr }}
                        </span> -->
                        <span style="cursor: pointer; font-weight: bold; margin-right: 8px;" 
                            onclick="copyTicker('{{ item.ticker }}')" 
                            title="클릭하여 티커 복사">
                            <!-- [{{ item.ticker_clean }}]  -->
                            {{ item.name_kr }} 
                        </span>
                        <!-- {% if item.up_days > 0 %}
                        <span class="text-danger ms-2 fw-bold" style="font-size: 0.8rem; white-space: nowrap;">(+{{ item.up_days }}일)</span>
                        {% endif %} -->
                    </div>
                </td>
                
                <td class="text-center">
                    <a href="{{ item.trend_url }}" target="_blank" class="text-decoration-none">
                        <div class="signal-light t-light d-inline-flex justify-content-center align-items-center {{ item.t_signal }}">
                            <span class="text-dark fw-bold" style="font-size: 0.7rem; opacity: 0.9;">T</span>
                        </div>
                    </a>
                </td>
                
                <td class="text-center">
                    <a href="{{ item.naver_url }}" target="_blank" class="text-decoration-none">
                        <div class="signal-light n-light d-inline-flex justify-content-center align-items-center {{ item.n_signal }}">
                            <span class="text-dark fw-bold" style="font-size: 0.7rem; opacity: 0.9;">N</span>
                        </div>
                    </a>
                </td>

                <!-- <td class="text-center">
                    <div class="signal-light c-light d-inline-flex justify-content-center align-items-center {{ item.c_signal }}" title="{{ item.p_name }}">
                        <span class="text-dark fw-bold" style="font-size: 0.7rem; opacity: 0.9;">C</span>
                    </div>
                </td> -->

                <td class="text-center">
                    <button type="button" 
                            class="btn btn-sm badge badge-signal badge-{{ item.signal_code|slice:':1' }}" 
                            data-bs-toggle="popover" 
                            data-bs-trigger="focus" 
                            data-bs-placement="left" 
                            title="[{{ item.signal_code }}] {{ item.signal_name }}" 
                            data-bs-content="{{ item.signal_desc }}">
                        {{ item.signal_name }}
                    </button>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="5" class="text-center text-muted py-5 font-monospace">
                    등록된 종목이 없습니다.
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
