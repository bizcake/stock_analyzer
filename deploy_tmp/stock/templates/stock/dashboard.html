{% load static %}
<!DOCTYPE html>
<html lang="ko" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 종목 분석 대시보드</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; font-family: 'Pretendard', sans-serif; }
        
        .signal-light {
            display: inline-flex; justify-content: center; align-items: center;
            width: 22px; height: 22px; border-radius: 50%;
            margin: 0 4px; background-color: #444; transition: all 0.3s ease;
        }
        .signal-light.green { background-color: #00e676; box-shadow: 0 0 8px #00e676; }
        .signal-light.red { background-color: #ff1744; box-shadow: 0 0 8px #ff1744; }
        .signal-light.orange { background-color: #ffb300; box-shadow: 0 0 8px #ffb300; }
        .signal-light.gray { background-color: #555; }
        
        .nav-tabs { border-bottom: 1px solid #333; }
        .nav-tabs .nav-link { color: #888; border: none; padding: 12px 20px; font-weight: 600; }
        .nav-tabs .nav-link.active { background-color: transparent; color: #bb86fc; border-bottom: 2px solid #bb86fc; }
        .nav-tabs .nav-link:hover { color: #e0e0e0; }

        .badge-signal { padding: 6px 10px; font-size: 0.85rem; font-weight: 500; border-radius: 6px; cursor: pointer; }
        .badge-a { background-color: rgba(255, 23, 68, 0.15); color: #ff5252; border: 1px solid #ff5252; } 
        .badge-b { background-color: rgba(0, 176, 255, 0.15); color: #40c4ff; border: 1px solid #40c4ff; } 
        .badge-c { background-color: rgba(255, 179, 0, 0.15); color: #ffd740; border: 1px solid #ffd740; } 
        .badge-d { background-color: rgba(158, 158, 158, 0.15); color: #9e9e9e; border: 1px solid #9e9e9e; }
        
        .btn-custom { border-radius: 8px; font-weight: 500; letter-spacing: -0.5px; }
    </style>
</head>
<body>
<div class="container py-4">
    
    <div class="d-flex justify-content-between align-items-center mb-2">
        <h3 class="fw-bold m-0" style="color: #fff;">📊 AI 종목 대시보드</h3>
        <!-- <button class="btn btn-outline-light btn-custom" data-bs-toggle="modal" data-bs-target="#manageModal">⚙️ 종목 검색</button> -->
    </div>

    <ul class="nav nav-tabs" id="stockTab" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="kr-tab" data-bs-toggle="tab" data-bs-target="#ks-content" type="button" role="tab">국내 주식</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="us-tab" data-bs-toggle="tab" data-bs-target="#us-content" type="button" role="tab">미국 주식</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="coin-tab" data-bs-toggle="tab" data-bs-target="#coin-content" type="button" role="tab">암호화폐</button>
        </li>
    </ul>

    <div class="tab-content" id="stockTabContent">
        <div class="tab-pane fade show active" id="ks-content" role="tabpanel">
            {% include "stock/partial_table.html" with stocks=categorized_stocks.KR %}
        </div>
        <div class="tab-pane fade" id="us-content" role="tabpanel">
            {% include "stock/partial_table.html" with stocks=categorized_stocks.US %}
        </div>
        <div class="tab-pane fade" id="coin-content" role="tabpanel">
            {% include "stock/partial_table.html" with stocks=categorized_stocks.COIN %}
        </div>
    </div>
</div>

<div class="modal fade" id="manageModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content bg-dark text-light border-secondary">
            <div class="modal-header border-secondary">
                <h5 class="modal-title fw-bold">🔍 종목 검색 및 추가</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="input-group mb-4">
                    <input type="text" id="searchInput" class="form-control bg-dark text-light border-secondary" placeholder="종목명 또는 티커 (예: AAPL)">
                    <button class="btn btn-primary btn-custom" id="btnSearch">검색</button>
                </div>
                <ul class="list-group mb-4" id="searchResults"></ul>
                
                <hr class="border-secondary">
                <h6 class="text-secondary mb-3">직접 등록</h6>
                <div class="row g-2">
                    <div class="col-md-3"><input type="text" id="newTicker" class="form-control bg-dark text-light border-secondary" placeholder="티커"></div>
                    <div class="col-md-4"><input type="text" id="newName" class="form-control bg-dark text-light border-secondary" placeholder="종목명"></div>
                    <div class="col-md-3">
                        <select id="newMarket" class="form-select bg-dark text-light border-secondary">
                            <option value="KS">국내 (KR)</option>
                            <option value="US">해외 (US)</option>
                            <option value="COIN">코인 (COIN)</option>
                        </select>
                    </div>
                    <div class="col-md-2"><button class="btn btn-success w-100 btn-custom" id="btnForceAdd">등록</button></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
$(document).ready(function() {
    // 팝오버 초기화
    const popoverTriggerList = document.querySelectorAll('[data-bs-toggle="popover"]');
    const popoverList = [...popoverTriggerList].map(popoverTriggerEl => 
        new bootstrap.Popover(popoverTriggerEl, { html: true, animation: true })
    );

    // 검색
    $('#btnSearch').click(function() {
        let keyword = $('#searchInput').val();
        if(keyword.length < 2) { alert("2글자 이상 입력해주세요."); return; }
        
        $.post("/stock/api/search/", { action: 'search', keyword: keyword }, function(res) {
            $('#searchResults').empty();
            if(res.results.length === 0) {
                $('#searchResults').append('<li class="list-group-item bg-dark border-secondary text-muted">결과가 없습니다.</li>'); return;
            }
            res.results.forEach(s => {
                $('#searchResults').append(`
                    <li class="list-group-item bg-dark border-secondary d-flex justify-content-between align-items-center">
                        <span>${s.name} <small class="text-secondary">(${s.ticker})</small></span>
                        <button class="btn btn-sm btn-outline-light add-to-tracked" data-id="${s.id}" data-ticker="${s.ticker}" data-name="${s.name}" data-market="${s.market}">선택</button>
                    </li>
                `);
            });
        });
    });

    $(document).on('click', '.add-to-tracked', function() {
        let market = $(this).data('market');
        if (market == 'KOSPI'||market == 'KOSDAQ') market = 'KR';
        else if (market != 'COIN') market = 'US';
        
        $('#newTicker').val($(this).data('ticker')).focus();
        $('#newName').val($(this).data('name'));
        $('#newMarket').val(market).trigger('change');
    });

    $('#btnForceAdd').click(function() {
        let data = { action: 'add_master', ticker: $('#newTicker').val(), name: $('#newName').val(), market: $('#newMarket').val() };
        $.post("/stock/api/search/", data, function(res) {
            if(res.status === 'success') {
                $.post("/stock/api/manage/", { stock_id: res.id, action: 'add' }, function() { location.reload(); });
            }
        });
    });
});
// 티커 복사 기능 및 알림 표시
function copyTicker(ticker) {
    // 1. 클립보드에 티커 복사
    navigator.clipboard.writeText(ticker).then(() => {
        
        // 2. 복사 성공 시 화면 하단에 작게 알림창(Toast) 생성
        let toast = document.getElementById("clipboard-toast");
        if (!toast) {
            toast = document.createElement("div");
            toast.id = "clipboard-toast";
            toast.style.cssText = "visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center; border-radius: 8px; padding: 12px; position: fixed; z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%); font-size: 14px; transition: opacity 0.3s, bottom 0.3s;";
            document.body.appendChild(toast);
        }
        
        // 메시지 설정 후 띄우기
        toast.innerHTML = "✅ '" + ticker + "' 복사 완료!";
        toast.style.visibility = "visible";
        toast.style.opacity = "1";
        toast.style.bottom = "40px";
        
        // 2초 뒤에 자연스럽게 사라짐
        setTimeout(function() { 
            toast.style.opacity = "0"; 
            toast.style.bottom = "30px";
            setTimeout(() => { toast.style.visibility = "hidden"; }, 300); // 애니메이션 대기
        }, 2000);
        
    }).catch(err => {
        alert("복사 실패: " + err);
    });
}
</script>
</body>
</html>
