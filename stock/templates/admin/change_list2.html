{% extends "admin/change_list.html" %}
{% load i18n admin_urls static admin_list jazzmin %}

{% block extrahead %}
{{ block.super }}
<style>
    /* ==========================================
       1. 불필요한 영역 제거
       ========================================== */
    /* 우측 상단 경로 (홈 / Stock / Stock analysis latests) 숨김 */
    ol.breadcrumb, .breadcrumb {
        display: none !important;
    }

    /* 불필요한 필터/검색 텍스트 라벨 숨김 */
    #changelist-filter h2, 
    #changelist-filter h3,
    #changelist-search label {
        display: none !important;
    }

    /* ==========================================
       2. 모든 요소를 한 줄(Single Row)로 밀착 배치
       ========================================== */
    /* 테마가 요소들을 양끝으로 찢어놓는 속성 해제, 왼쪽부터 순서대로 나열, 줄바꿈 금지 */
    #change-list-filters > .d-flex {
        justify-content: flex-start !important; 
        flex-wrap: nowrap !important; 
        gap: 8px !important; 
        margin-bottom: 10px !important;
    }

    /* 검색 폼이 빈 공간을 차지하며 팽창하는 현상 방지 */
    #changelist-search {
        flex-grow: 0 !important; 
        width: auto !important;
        display: flex !important;
        flex-wrap: nowrap !important;
        align-items: center !important;
        gap: 8px !important;
        margin: 0 !important;
    }

    /* 폼 내부의 div 여백 제거 */
    #changelist-search .form-group {
        margin: 0 !important;
        display: flex !important;
        align-items: center !important;
    }

    /* 추가 버튼(a 태그)의 float 속성을 해제하고 Flex 흐름에 합류시킴 */
    #change-list-filters a.btn,
    .object-tools {
        float: none !important;
        display: inline-flex !important;
        align-items: center !important;
        margin: 0 !important;
    }

    /* ==========================================
       4. 모바일 환경 대응
       ========================================== */
    @media (max-width: 768px) {
        /* 모바일에서는 가로 폭이 부족하므로 강제로 스크롤 허용 또는 간격 축소 */
        #change-list-filters > .d-flex {
            gap: 4px !important;
            overflow-x: auto !important; /* 좁을 경우 가로 스크롤 생성 */
            padding-bottom: 5px !important;
        }
    }
    /* ==========================================
       2. 셀렉트/인풋 너비 확대 및 검색버튼 우측 정렬
       ========================================== */
    /* 전체 컨테이너 가로 100% 사용 */
    #change-list-filters > .d-flex {
        display: flex !important;
        width: 100% !important;
        flex-wrap: nowrap !important;
        gap: 12px !important;
        margin-bottom: 10px !important;
        align-items: center !important;
    }

    /* 셀렉트 박스 영역 (보유여부, market) */
    #changelist-filter {
        display: flex !important;
        flex: 0 0 auto !important; /* 자식 요소 크기만큼만 영역 차지 */
        gap: 10px !important;
        margin: 0 !important;
    }

    /* 검색 영역 (인풋, 버튼) - 남은 우측 공간을 모두 차지하도록 팽창 */
    #changelist-search {
        display: flex !important;
        flex: 1 !important; 
        gap: 10px !important;
        margin: 0 !important;
        align-items: center !important;
    }

    /* ==========================================
    3. 높이(32px) 고정 및 수직 중앙 정렬 보정
    ========================================== */
    #changelist-filter select,
    #changelist-search input[type="text"],
    #changelist-search button,
    #change-list-filters a.btn {
        height: 32px !important;
        min-height: 32px !important;
        padding: 0 10px !important;
        font-size: 13px !important;
        line-height: normal !important;
        box-sizing: border-box !important;
        white-space: nowrap !important; /* 두 줄 쪼개짐 방지 */
    }

    #changelist-search button {
        margin-left: auto !important; /* 남은 빈 공간을 좌측 마진으로 밀어내어 우측 끝에 고정 */
        flex: 0 0 auto !important;
    }

    /* Select2 플러그인 높이 및 텍스트 정렬 보정 */
    .select2-container .select2-selection--single {
        height: 32px !important;
        display: flex !important;
        align-items: center !important;
    }
    .select2-selection__rendered {
        line-height: normal !important;
        padding-top: 0 !important;
        padding-left: 10px !important;
    }

    /* 입력창 및 셀렉트 박스 너비 고정 */
    #changelist-search input[type="text"] {
        width: 110px !important; 
        min-width: 110px !important;
        flex-grow: 0 !important;
    }

    #changelist-filter select, .select2-container { 
        width: 90px !important; 
        min-width: 90px !important;
    }

</style>

<script>
document.addEventListener("DOMContentLoaded", function() {
    // 버튼 텍스트 '추가'로 변경 (기존 로직 유지)
    const addButtons = document.querySelectorAll("a.btn, .object-tools a");
    
    addButtons.forEach(btn => {
        const href = btn.getAttribute('href');
        if (href && href.includes('/add/')) {
            const icon = btn.querySelector('i');
            btn.innerHTML = ''; 
            
            if (icon) {
                btn.appendChild(icon);
                btn.appendChild(document.createTextNode(" "));
            } else {
                btn.innerText = " ";
            }
        }
    });// 1. 이동시킬 대상 버튼 선택
    const addButton = document.querySelector("a[href*='/admin/stock/stockanalysislatest/add/']");
    
    // 2. 목적지 h3 타이틀 선택 (필요시 해당 h3의 고유 클래스나 ID로 변경)
    const targetH3 = document.querySelector("h3");

    if (addButton && targetH3) {
        // 3. 버튼에 float: right 스타일 강제 적용
        addButton.style.float = "right";
        addButton.style.margin = "0"; 
        
        // 4. h3 요소가 float 높이를 인식하도록 처리
        targetH3.style.overflow = "hidden"; 

        // 5. h3 내부로 버튼 이동
        targetH3.appendChild(addButton);
    }
    document.getElementById('change-list-filters').classList.remove('pb-4')
    
    // 병합할 대상 기준이 되는 컬럼의 클래스 (메서드명 기반으로 자동 생성됨)
    const targetColumnClass = '.field-get_name_kr'; 
    
    let previousCell = null;
    let rowspanCount = 1;

    const rows = document.querySelectorAll('#result_list tbody tr');
    
    rows.forEach(function(row) {
        const currentCell = row.querySelector(targetColumnClass);
        
        if (currentCell) {
            if (previousCell && previousCell.innerHTML === currentCell.innerHTML) {
                // 이전 셀과 내용이 같으면 rowspan 증가시키고 현재 셀은 숨김
                rowspanCount++;
                previousCell.setAttribute('rowspan', rowspanCount);
                previousCell.style.verticalAlign = 'middle'; // 중앙 정렬
                currentCell.style.display = 'none';
            } else {
                // 다르면 기준 셀 갱신
                previousCell = currentCell;
                rowspanCount = 1;
            }
        }
    });
});
</script>
{% endblock %}
