{% load i18n %}
<div class="jazzmin-dropdown-filter d-inline-flex align-items-center mr-3 mb-2">
    <h3 class="m-0 mr-2 text-muted font-weight-bold" style="font-size: 0.875rem;">
        {% blocktrans with filter_title=title %} {{ filter_title }} {% endblocktrans %}
    </h3>
    <select class="form-control form-control-sm custom-select custom-select-sm" 
            onchange="window.location.href=this.value;" 
            style="min-width: 120px; cursor: pointer;">
        {% for choice in choices %}
            <option value="{{ choice.query_string|iriencode }}" {% if choice.selected %}selected{% endif %}>
                {{ choice.display }}
            </option>
        {% endfor %}
    </select>
</div>
