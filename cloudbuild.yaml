steps:
  # 1. Cloud Run을 위한 Docker 이미지 빌드
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/stocks:$COMMIT_SHA', '.']

  # 2. 빌드된 이미지를 Container Registry에 푸시
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/stocks:$COMMIT_SHA']

# 3. Cloud Run (Django 앱) 배포
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'stocks'
      - '--image'
      - 'gcr.io/$PROJECT_ID/stocks:$COMMIT_SHA'
      - '--region'
      - 'us-west1'
      - '--platform'
      - 'managed'
      - '--memory'
      - '1Gi'
      - '--timeout'
      - '300s'
      - '--port'
      - '8000'
      - '--allow-unauthenticated'
      # ⬅️ 누락되었던 환경변수 주입 설정 추가
      - '--update-env-vars'
      - '^,^DB_HOST=$_DB_HOST,DB_USER=$_DB_USER,DB_PASSWORD=$_DB_PASSWORD,DJANGO_SECRET_KEY=$_DJANGO_SECRET_KEY'

  # 4. Cloud Functions (stock-analyzer-function) 배포
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'functions'
      - 'deploy'
      - 'stock-analyzer-function'
      - '--runtime'
      - 'python312'
      - '--trigger-topic'
      - 'trigger-stock-analysis'
      - '--entry-point'
      - 'run_stock_analysis'
      - '--region'
      - 'asia-northeast3'
      - '--memory'
      - '1024MB'
      - '--timeout'
      - '540s'
      - '--set-env-vars'
      - 'DB_HOST=$_DB_HOST,DB_USER=$_DB_USER,DB_PASSWORD=$_DB_PASSWORD,GEMINI_API_KEY=$_GEMINI_API_KEY,TELEGRAM_BOT_TOKEN=$_TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID=$_TELEGRAM_CHAT_ID,DJANGO_SECRET_KEY=$_DJANGO_SECRET_KEY'

# Cloud Functions 배포 단계 (예시)
  # - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  #   entrypoint: gcloud
  #   args:
  #     - 'functions'
  #     - 'deploy'
  #     - 'stock-analyzer-function'
  #     # ... (기존 설정 유지) ...
  #     - '--timeout=300s'
  #     # ⬅️ 함수에도 DB 접속 등을 위한 환경 변수 주입 추가
  #     - '--set-env-vars'
  #     - 'DB_HOST=$_DB_HOST,DB_USER=$_DB_USER,DB_PASSWORD=$_DB_PASSWORD,DJANGO_SECRET_KEY=$_DJANGO_SECRET_KEY'

images:
  - 'gcr.io/$PROJECT_ID/stocks:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
